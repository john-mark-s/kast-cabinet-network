name: Scrape ChileCompra

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ChileCompra scraper
        env:
          CHILECOMPRA_API_KEY: ${{ secrets.CHILECOMPRA_API_KEY }}
        run: python scripts/scrape_chilecompra.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/chilecompra/
          git diff --cached --quiet || git commit -m "chore: update ChileCompra data [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push origin HEAD
